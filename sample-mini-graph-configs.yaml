name: VOC
hours_to_show: 24
points_per_hour: 4
line_width: 2
font_size: 75
animate: true
show:
  labels: true
  points: false
  legend: false
  state: true
  name: true
  icon: false
  fill: fade
color_thresholds:
  - value: 0
    color: "#4ade80"    # Green: normal indoor levels
  - value: 390
    color: "#4ade80"
  - value: 410          # ← tight 20-unit band at 400 ppb boundary
    color: "#facc15"    # Yellow: slightly elevated
  - value: 790
    color: "#facc15"
  - value: 810
    color: "#fb923c"    # Orange: elevated, identify source
  - value: 1490
    color: "#fb923c"
  - value: 1510
    color: "#ef4444"    # Red: high, ventilate and investigate
entities:
  - entity: sensor.buzzbridge_thermostat_NAME_voc
    name: VOC
    show_state: true
card_mod:
  style: >
    ha-card {
      background: linear-gradient(165deg, #0f3049 0%, #0a1f2e 100%);
      border: 1px solid rgba(100,180,255,0.2);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      color: white;
    }

