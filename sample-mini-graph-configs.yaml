# ─── Comfort Index ────────────────────────────────────────────────
# BuzzBridge-calculated: 70% temperature accuracy + 30% humidity comfort.
# Higher = better (this one IS higher = better, unlike AQ Score).
type: custom:mini-graph-card
name: Comfort Index
hours_to_show: 24
points_per_hour: 4
line_width: 2
font_size: 75
animate: true
min: 0
max: 100
show:
  labels: true
  points: false
  legend: false
  state: true
  name: true
  icon: false
  fill: fade
color_thresholds:
  - value: 0
    color: "#ef4444"    # Red: poor comfort
  - value: 58
    color: "#ef4444"
  - value: 62
    color: "#fb923c"    # Orange: uncomfortable
  - value: 73
    color: "#fb923c"
  - value: 77
    color: "#facc15"    # Yellow: acceptable
  - value: 88
    color: "#facc15"
  - value: 92
    color: "#4ade80"    # Green: excellent comfort
entities:
  - entity: sensor.buzzbridge_thermostat_NAME_comfort_index
    name: Comfort
    show_state: true
card_mod:
  style: >
    ha-card {
      background: linear-gradient(165deg, #0f3049 0%, #0a1f2e 100%);
      border: 1px solid rgba(100,180,255,0.2);
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      color: white;
    }
